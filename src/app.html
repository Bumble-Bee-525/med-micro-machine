<!DOCTYPE html>
<html lang="en-US">
    <head>
        <meta charset="utf-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <title>Felina</title>
        <!-- TO DO: FAVICON-->
        <link rel="icon" href="assets/favicon.png" type="image/png">
        <!--Import Bootstrap CSS-->
        <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
        <link href="styles/styles.css" rel="stylesheet">
    </head>
    <body>
        <!-- default -->
        <h1>Guess I got, what I deserved</h1>
        <p>Kept you waiting there too long my love</p>


        <a href="https://github.com/Bumble-Bee-525/med-micro-machine">Help me....</a>


        <!--Main Panel-->
        <div class="container maxWidth-md">
            <div class="row g-2">
                <!--device selection menu-->
                <div class="col">
                    <div class="dropdown-center text-center">
                        <button class="btn btn-outline-primary dropdown-toggle" title="Select a Device" type="button" data-bs-toggle="dropdown" id="devicesMenuButton">Select Device</button>
                        <ul class="dropdown-menu" id="devicesMenu"></ul>
                    </div>
                </div>
                <!--file uploads-->
                <div class="col">
                    <input title="fileInput" type="file" class="form-control mfdButton" id="fileInput" accept="video/*, image/*">
                </div>
                <!--microscope lens info-->
                <div class="col">
                    <div class="input-group">
                        <input type="number" class="form-control" title="Magnification" id="magnificationInput" placeholder="Total Magnification:">
                    </div>
                </div>
                <div class="col">
                    <div class="input-group">
                        <input type="number" class="form-control" title="Field Number" id="fieldNumberInput" placeholder="Field Number:">
                    </div>
                </div>
            </div>
            <div class="row my-3 g-2">
                <div class="col">
                    <input class="form-control text-center mfdTextDisplay" disabled type="text" value="Standby for OpenCV initialization." title="Main Text Display" id="mainTextDisplay">
                </div>
            </div>
            <!--Instant Functions-->
            <!--MFD Style Display Buttons (emojis used to save on file size for icons ok? also im too lazy to make icons)-->
            <div class="row my-3 g-2">
                <div class="col text-center">
                    <button class="btn btn-outline-dark mfdButton">📏Scale Bar</button>
                </div>
                <div class="col text-center">
                    <button class="btn btn-outline-success mfdButton">📊Color Distance</button>
                </div>
                <div class="col text-center">
                    <button class="btn btn-outline-danger mfdButton">⚙️Color Calibrate</button>
                </div>
                <div class="col text-center">
                    <button class="btn btn-outline-info mfdButton" data-bs-toggle="button" id="freezeButton">❄️Freeze</button>
                </div>
            </div>
            <div class="row" id="canvasOutputParent">
                <canvas id="canvasOutput" class="hide"></canvas>
                <img src="assets/cameraAlt.png" id="defaultImage" alt="defaultImage">
                <!--Hidden Canvas Element used as Buffers-->
                <canvas id="rawBufferCanvas" class="hide"></canvas>
            </div>
            <!--Continuous functions-->
            <div class="row my-3 g-2">
                <div class="col text-center">
                    <button class="btn btn-outline-warning mfdButton">📸Photo</button>
                </div>
                <div class="col text-center">
                    <button class="btn btn-outline-danger mfdButton" data-bs-toggle="button">🎥Record</button>
                </div>
                <div class="col text-center">
                    <button class="btn btn-outline-primary mfdButton" data-bs-toggle="button">Edge/Contour</button>
                </div>
                <div class="col text-center">
                    <button class="btn btn-outline-success mfdButton" data-bs-toggle="button">Mosaic Imaging</button>
                </div>
            </div>
            <!---->
            <div class="row my-3">
                <div class="col">
                    <textarea class="mfdButton" title="notepad">NOTEPAD: write anything you want here</textarea>
                </div>
            </div>
        </div>

        <footer class="text-center">
            Logo and Favicon Produced by Charlie Fifield 🦆
        </footer>

        <!--hidden video element that actually parses frames from camera-->
        <video id="userVideoTag" controls class="hide"></video>


        <!-- Begin Sphagetti Code-->
        <!--DO NOT TOUCH THE ORDER, WAS MASSIVE PAIN TO FIGURE OUT WHY CODE NOT WORKING-->
        <!--First, set reminder for openCV to activate camera code JS file once WASM binary crap, not just JS, is ready-->
        <script src="scripts/utils.js"></script>
        <script src="scripts/initOpenCV.js"></script>
        <script src="scripts/streamHandler.js"></script>
        <!--Next, openCV loads all JS objects/classes so they can be used and initializes the WASM binary stuf-->
        <script src="https://docs.opencv.org/4.x/opencv.js" type="text/javascript"></script>
        <!--Finally, only once BOTH the javascript AND WASM above is ready, do we load and later execute-->
        <script src="scripts/videoProcessLoop.js" type="text/javascript"></script>
        <script src="scripts/uiHandlers.js" type="text/javascript"></script>
        <!--Import bootstrap-->
        <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js" integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI" crossorigin="anonymous"></script>
    </body>
</html>
